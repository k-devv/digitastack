<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 1200px;
        height: 630px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
    }
    .card {
        text-align: center;
        padding: 60px;
        max-width: 900px;
    }
    .logo {
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 24px;
        letter-spacing: -1px;
    }
    .logo span { color: #60a5fa; }
    .tagline {
        font-size: 28px;
        font-weight: 400;
        color: #94a3b8;
        line-height: 1.4;
    }
    .accent { color: #60a5fa; }
</style>
</head>
<body>
    <div class="card">
        <div class="logo">Digital<span>Stack</span></div>
        <div class="tagline">AI Tools, SEO &amp; Digital Strategy<br>that <span class="accent">actually work</span>.</div>
    </div>
</body>
</html>
